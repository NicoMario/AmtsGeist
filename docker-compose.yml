# AmtsGeist — lokaler/On-Prem-Stack: Ollama (Modelle) + Backend ("das Gehirn").
# Das Outlook-Add-in läuft separat (siehe addin/, npm run dev-server) und spricht das Backend an.

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    # --- GPU (NVIDIA) im Rechenzentrum: folgende Zeilen aktivieren ---
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      AMTSGEIST_OLLAMA_BASE_URL: http://ollama:11434
      AMTSGEIST_SLM_MODEL: qwen2.5:3b
      AMTSGEIST_LLM_MODEL: qwen2.5:7b
      AMTSGEIST_ALLOWED_ORIGINS: '["https://localhost:3000"]'
    depends_on:
      - ollama

volumes:
  ollama:
# Nach dem Start einmalig die Modelle in den Ollama-Container laden:
#   docker compose exec ollama ollama pull qwen2.5:3b
#   docker compose exec ollama ollama pull qwen2.5:7b
